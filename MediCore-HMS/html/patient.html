<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCore HMS - Patient Management</title>
    <link rel="stylesheet" href="../css/patient.css">
</head>

<body>

    <div class="sidebar">

        <img src="../assets/Logo.png" alt="MediCore HMS Logo" class="logo">

        <h2>MediCore HMS</h2>

        <ul>
            <li>Dashboard</li>
            <li class="active">Patients</li>
            <li>Billing</li>
            <li>Reports</li>
            <li>Settings</li>
            <li>Logout</li>
        </ul>

    </div>

    <div class="main-content">

        <div class="top-bar">

            <div>
                <h1>Patient Management</h1>
                <p>Manage all patient records from one place.</p>
            </div>

        <a href="addpatient.html">
            <button>Add Patient</button>
        </a>

        </div>

        <div class="search-box">

            <input type="text" placeholder="Search Patient...">

        </div>

        <div class="table-container">

            <table>

                <tr>
                    <th>Patient ID</th>
                    <th>Full Name</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Phone</th>
                    <th>Blood Group</th>
                    <th>Action</th>
                </tr>

            </table>

        </div>

        <div class="footer-info">

            <p>Total Patients : 0</p>

        </div>

    </div>

</body>

</html>

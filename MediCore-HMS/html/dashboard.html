<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCore HMS - Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <div class="sidebar">
        <img src="../assets/Logo.png" alt="MediCore HMS Logo" class="logo">
        <h2>MediCore HMS</h2>
        <ul>
            <li>Dashboard</li>
            <li>Patients</li>
            <li>Billing</li>
            <li>Reports</li>
            <li>Settings</li>
            <li>Logout</li>
        </ul>
    </div>
    <div class="main-content">

        <h1>Dashboard</h1>

        <p>Precision. Care. Innovation.</p>

        <div class="cards">

            <div class="card">
                <h3>Patients</h3>
                <p>Manage patient records.</p>
            </div>

            <div class="card">
                <h3>Billing</h3>
                <p>Create and manage bills.</p>
            </div>

            <div class="card">
                <h3>Reports</h3>
                <p>View hospital reports.</p>
            </div>

            <div class="card">
                <h3>Settings</h3>
                <p>Manage application settings.</p>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci Calculator Pro</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .container {
            max-width: 1400px;
            margin: auto;
        }

        h1 {
            text-align: center;
        }

        .calculators {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .panel {
            flex: 1;
            min-width: 400px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #1d4ed8;
        }

        .tables {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .box {
            flex: 1;
            min-width: 250px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #334155;
        }

        td,
        th {
            border: 1px solid #475569;
            padding: 8px;
            text-align: center;
        }

        .retracement-title {
            color: #4ade80;
        }

        .extension-title {
            color: #60a5fa;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>📈 Fibonacci Calculator (ABC)</h1>

        <div class="calculators">

            <!-- UPTREND -->

            <div class="panel">

                <h2>📈 Uptrend</h2>

                <label>High (A)</label>
                <input type="number" id="upHigh" value="200">

                <label>Low (B)</label>
                <input type="number" id="upLow" value="100">

                <label>Custom (C)</label>
                <input type="number" id="upCustom" value="150">

                <button onclick="calculateUptrend()">
                    Calculate Uptrend
                </button>

                <div class="tables">

                    <div class="box">

                        <h3 class="retracement-title">
                            Retracements
                        </h3>

                        <table>
                            <thead>
                                <tr>
                                    <th>Level</th>
                                    <th>Price</th>
                                </tr>
                            </thead>

                            <tbody id="upRetracementTable"></tbody>

                        </table>

                    </div>

                    <div class="box">

                        <h3 class="extension-title">
                            Extensions
                        </h3>

                        <table>
                            <thead>
                                <tr>
                                    <th>Level</th>
                                    <th>Price</th>
                                </tr>
                            </thead>

                            <tbody id="upExtensionTable"></tbody>

                        </table>

                    </div>

                </div>

            </div>

            <!-- DOWNTREND -->

            <div class="panel">

                <h2>📉 Downtrend</h2>

                <label>High (A)</label>
                <input type="number" id="downHigh" value="200">

                <label>Low (B)</label>
                <input type="number" id="downLow" value="100">

                <label>Custom (C)</label>
                <input type="number" id="downCustom" value="150">

                <button onclick="calculateDowntrend()">
                    Calculate Downtrend
                </button>

                <div class="tables">

                    <div class="box">

                        <h3 class="retracement-title">
                            Retracements
                        </h3>

                        <table>
                            <thead>
                                <tr>
                                    <th>Level</th>
                                    <th>Price</th>
                                </tr>
                            </thead>

                            <tbody id="downRetracementTable"></tbody>

                        </table>

                    </div>

                    <div class="box">

                        <h3 class="extension-title">
                            Extensions
                        </h3>

                        <table>
                            <thead>
                                <tr>
                                    <th>Level</th>
                                    <th>Price</th>
                                </tr>
                            </thead>

                            <tbody id="downExtensionTable"></tbody>

                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>

        const retracements = [
            0,
            23.6,
            38.2,
            50,
            61.8,
            76.4,
            100,
            138.2
        ];

      const extensions = [
            23.6,
            38.2,
            50,
            61.8,
            100,
            138.2,
            161.8,
            200,
            300
        ];

        function calculateUptrend() {

            const low =
                parseFloat(document.getElementById("upLow").value);

            const high =
                parseFloat(document.getElementById("upHigh").value);

            const custom =
                parseFloat(document.getElementById("upCustom").value);

            const move = high - low;

            let retracementHTML = "";
            let extensionHTML = "";

            retracements.forEach(level => {

                let price;

                if (level <= 100) {
                    price = high - (move * level / 100);
                }
                else {
                    price = low - (move * ((level - 100) / 100));
                }

                retracementHTML += `
<tr>
<td>${level}%</td>
<td>${price.toFixed(4)}</td>
</tr>
`;

            });

            extensions.forEach(level => {

                const price =
                    custom + (move * level / 100);

                extensionHTML += `
<tr>
<td>${level}%</td>
<td>${price.toFixed(4)}</td>
</tr>
`;

            });

            document.getElementById(
                "upRetracementTable"
            ).innerHTML = retracementHTML;

            document.getElementById(
                "upExtensionTable"
            ).innerHTML = extensionHTML;

        }

        function calculateDowntrend() {

            const high =
                parseFloat(document.getElementById("downHigh").value);

            const low =
                parseFloat(document.getElementById("downLow").value);

            const custom =
                parseFloat(document.getElementById("downCustom").value);

            const move = high - low;

            let retracementHTML = "";
            let extensionHTML = "";

            retracements.forEach(level => {

                let price;

                if (level <= 100) {
                    price = low + (move * level / 100);
                }
                else {
                    price = high + (move * ((level - 100) / 100));
                }

                retracementHTML += `
<tr>
<td>${level}%</td>
<td>${price.toFixed(4)}</td>
</tr>
`;

            });

            extensions.forEach(level => {

                const price =
                    custom - (move * level / 100);

                extensionHTML += `
<tr>
<td>${level}%</td>
<td>${price.toFixed(4)}</td>
</tr>
`;

            });

            document.getElementById(
                "downRetracementTable"
            ).innerHTML = retracementHTML;

            document.getElementById(
                "downExtensionTable"
            ).innerHTML = extensionHTML;

        }

        calculateUptrend();
        calculateDowntrend();

    </script>

</body>

</html>

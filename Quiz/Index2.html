<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hindi Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .question {
            margin-bottom: 15px;
        }

        .options label {
            display: block;
            margin: 5px 0;
        }

        button {
            margin-top: 10px;
            padding: 8px 12px;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Hindi Quiz</h1>

    <div class="question">
        <p>1. What is the powerhouse of the cell?</p>
        <div class="options">
            <label><input type="radio" name="q1" value="a"> Nucleus</label>
            <label><input type="radio" name="q1" value="b"> Mitochondria </label>
            <label><input type="radio" name="q1" value="c"> Cell membrane</label>
            <label><input type="radio" name="q1" value="d"> Brain</label>
        </div>
    </div>

    <div class="question">
        <p>2. Which organ pumps blood?</p>
        <div class="options">
            <label><input type="radio" name="q2" value="a"> Heart</label>
            <label><input type="radio" name="q2" value="b"> Brain</label>
            <label><input type="radio" name="q2" value="c"> Lungs</label>
            <label><input type="radio" name="q2" value="d"> Skin</label>
        </div>
    </div>

    <div class="question">
        <p>3.How many bones does an adult have?</p>
        <div class="options">
            <label><input type="radio" name="q3" value="a"> 270</label>
            <label><input type="radio" name="q3" value="b"> 83</label>
            <label><input type="radio" name="q3" value="c"> 206</label>
            <label><input type="radio" name="q3" value="d"> 811</label>
        </div>
    </div>

    <div class="question">
        <p>4. Which organ helps you breathe?</p>
        <div class="options">
            <label><input type="radio" name="q4" value="a"> Stomacch</label>
            <label><input type="radio" name="q4" value="b"> Lungs</label>
            <label><input type="radio" name="q4" value="c"> Liver</label>
            <label><input type="radio" name="q4" value="d"> Heart</label>
        </div>
    </div>

    <div class="question">
        <p>5. How many hearts does a normal human have?</p>
        <div class="options">
            <label><input type="radio" name="q5" value="a"> 1</label>
            <label><input type="radio" name="q5" value="b"> 3</label>
            <label><input type="radio" name="q5" value="c"> 5</label>
            <label><input type="radio" name="q5" value="d"> 1000</label>
        </div>
    </div>

    <button onclick="checkAnswers()">Submit</button>
    <div id="result"></div>

    <script>
        function checkAnswers() {
            let score = 0;
            if (document.querySelector('input[name="q1"]:checked')?.value === "b") score++;
            if (document.querySelector('input[name="q2"]:checked')?.value === "a") score++;
            if (document.querySelector('input[name="q3"]:checked')?.value === "c") score++;
            if (document.querySelector('input[name="q4"]:checked')?.value === "b") score++;
            if (document.querySelector('input[name="q5"]:checked')?.value === "a") score++;
            document.getElementById("result").textContent = "You scored " + score + "/5";
        }
    </script>
</body>

</html>
